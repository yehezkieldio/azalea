#:schema ./azalea.schema.json

[runtime]
worker_threads = 4
max_blocking_threads = 16
thread_stack_size = 2097152

[concurrency]
download = 4
upload = 2
transcode = 2
ytdlp = 2
pipeline = 8

[http]
pool_max_idle_per_host = 8
pool_idle_timeout_secs = 90
connect_timeout_secs = 10
timeout_secs = 60
http2_adaptive_window = false
http2_initial_stream_window_size_bytes = 8388608
http2_initial_connection_window_size_bytes = 33554432
http2_max_frame_size_bytes = 262144

[storage]
temp_dir = "/tmp/azalea"
dedup_ttl_hours = 24
dedup_cache_size = 1000
dedup_persistent = true
dedup_db_path = "azalea-dedup.redb"
dedup_flush_interval_secs = 60
metrics_db_path = "azalea-metrics.redb"
metrics_enabled = true
resolver_cache_ttl_secs = 300
resolver_cache_size = 1000
resolver_negative_ttl_secs = 60

[transcode]
# possible values: fast, balanced, quality, size
quality_preset = "fast"
# possible values: none, nvenc, vaapi, videotoolbox, qsv, amf
hardware_acceleration = "qsv"
ffmpeg_threads = 0
vaapi_device = "/dev/dri/renderD128"
max_upload_bytes = 8388608
container_overhead_ratio = 0.03
vbr_safety_margin = 0.05
transcode_target_ratio = 0.85
split_target_ratio = 0.8
audio_vbr_padding = 1.1
min_bitrate_kbps = 400
max_single_video_duration_secs = 120
ffprobe_timeout_secs = 30
ffmpeg_timeout_secs = 600

[pipeline]
queue_backpressure_timeout_ms = 1000
download_timeout_secs = 60
download_write_buffer_bytes = 1048576
upload_timeout_secs = 120
min_disk_space_bytes = 524288000
max_download_bytes = 524288000
resolver_timeout_secs = 10
ytdlp_timeout_secs = 30
user_rate_limit_requests = 10
user_rate_limit_window_secs = 60
channel_rate_limit_requests = 20
channel_rate_limit_window_secs = 60
parallel_segment_threshold = 2
batch_upload_multiple_media = true

[binaries]
ffmpeg = "ffmpeg"
ffprobe = "ffprobe"
ytdlp = "yt-dlp"
