name: Release

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/master' }}

jobs:
  build-and-push:
    name: Build & Push Docker Images
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        flavor: [cpu, vaapi]

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},enable=${{ matrix.flavor == 'cpu' }}
            type=raw,value=latest,enable=${{ matrix.flavor == 'cpu' }}
            type=semver,pattern={{version}}-vaapi,enable=${{ matrix.flavor == 'vaapi' }}
            type=raw,value=vaapi,enable=${{ matrix.flavor == 'vaapi' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-${{ matrix.flavor }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          # Registry-backed layer cache keyed per flavor to avoid cross-contamination.
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-${{ matrix.flavor }}
          cache-to:   type=registry,ref=${{ env.IMAGE }}:buildcache-${{ matrix.flavor }},mode=max

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name:   ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - uses: sigstore/cosign-installer@v3
      - name: Sign image
        run: cosign sign --yes ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}

  announce-release:
    name: Announce GitHub Release
    needs: [build-and-push]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          CLEAN_VER="${GITHUB_REF_NAME#v}"
          # Pull the section for this version from CHANGELOG.md; fall back to a
          # minimal placeholder if the version entry is missing.
          awk -v ver="$CLEAN_VER" '
            $0 ~ "^## \\[" ver || $0 ~ "^## " ver { in_section=1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > release_notes.txt
          [ -s release_notes.txt ] || echo "Release ${GITHUB_REF_NAME}" > release_notes.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }} # Announce as project maintainer instead of the GitHub Actions bot
          body_path: release_notes.txt
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}