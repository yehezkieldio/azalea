name: Release

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}
  CACHE_IMAGE: ghcr.io/${{ github.repository }}/buildcache
  YTDLP_TAG: 2026.02.21
  FFMPEG_TAG: latest
  FFMPEG_TARBALL: ffmpeg-master-latest-linux64-gpl.tar.xz

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        flavor: [cpu, vaapi]

    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},enable=${{ matrix.flavor == 'cpu' }}
            type=raw,value=latest,enable=${{ matrix.flavor == 'cpu' }}
            type=semver,pattern={{version}}-vaapi,enable=${{ matrix.flavor == 'vaapi' }}
            type=raw,value=vaapi,enable=${{ matrix.flavor == 'vaapi' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-${{ matrix.flavor }}
          platforms: linux/amd64
          build-args: |
            YTDLP_TAG=${{ env.YTDLP_TAG }}
            FFMPEG_TAG=${{ env.FFMPEG_TAG }}
            FFMPEG_TARBALL=${{ env.FFMPEG_TARBALL }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:${{ matrix.flavor }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }}:${{ matrix.flavor }},mode=min

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name:   ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - uses: sigstore/cosign-installer@v3
      - name: Sign image
        run: cosign sign --yes ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}

  announce-release:
    name: Announce GitHub Release
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          CLEAN_VER="${GITHUB_REF_NAME#v}"
          # Pull the section for this version from CHANGELOG.md; fall back to a
          # minimal placeholder if the version entry is missing.
          awk -v ver="$CLEAN_VER" '
            $0 ~ "^## \\[" ver || $0 ~ "^## " ver { in_section=1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > release_notes.txt
          [ -s release_notes.txt ] || echo "Release ${GITHUB_REF_NAME}" > release_notes.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }} # Announce as project maintainer instead of the GitHub Actions bot
          body_path: release_notes.txt
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

  cleanup:
    name: Cleanup Old Cache
    needs: [build-and-push]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Cleanup runtime untagged
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: 'container'
          min-versions-to-keep: 0
          delete-only-untagged-versions: 'true'
      - name: Cleanup old cache versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}/buildcache
          package-type: 'container'
          min-versions-to-keep: 5