name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write
    packages: write
    id-token: write
    attestations: write

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    build-and-push:
        name: Build Docker Images
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                flavor: [cpu, vaapi]

        steps:
            - uses: actions/checkout@v6

            - uses: docker/setup-buildx-action@v3

            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker Metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository }}
                  tags: |
                      type=semver,pattern={{version}},enable=${{ matrix.flavor == 'cpu' }}
                      type=raw,value=latest,enable=${{ matrix.flavor == 'cpu' }}
                      type=semver,pattern={{version}}-vaapi,enable=${{ matrix.flavor == 'vaapi' }}
                      type=raw,value=vaapi,enable=${{ matrix.flavor == 'vaapi' }}

            - name: Build and Push
              id: build
              uses: docker/build-push-action@v6
              with:
                  context: .
                  target: runtime-${{ matrix.flavor }}
                  platforms: linux/amd64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  sbom: true
                  provenance: mode=max
                  cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache-${{ matrix.flavor }}
                  cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache-${{ matrix.flavor }},mode=max

            - name: Attest Build Provenance
              uses: actions/attest-build-provenance@v1
              with:
                subject-name: ghcr.io/${{ github.repository }}
                subject-digest: ${{ steps.build.outputs.digest }}
                push-to-registry: true

            - uses: sigstore/cosign-installer@v3

            - name: Sign image digest
              run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

    create-release:
        name: Publish GitHub Release
        needs: build-and-push
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v6

            - name: Extract release notes
              id: changelog
              run: |
                  VERSION="${{ github.ref_name }}"
                  CLEAN_VER="${VERSION#v}"

                  awk -v ver="$CLEAN_VER" '
                    $0 ~ "^## \\[" ver || $0 ~ "^## " ver { in_section=1; next }
                    in_section && /^## / { exit }
                    in_section { print }
                  ' CHANGELOG.md > release_notes.txt

                  if [ ! -s release_notes.txt ]; then
                    echo "Release ${{ github.ref_name }}" > release_notes.txt
                  fi

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  token: ${{ secrets.RELEASE_TOKEN }} # Release as project maintainer instead of the GitHub Actions bot
                  body_path: release_notes.txt
                  prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}